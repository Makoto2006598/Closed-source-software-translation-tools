name: Build macOS DMG

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "版本号（如 1.0.0）"
        required: false
        default: "dev"

# 创建 Release 和上传 artifact 都需要写权限
permissions:
  contents: write

jobs:
  build:
    name: Build DMG on macOS
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools
          pip install -r requirements.txt
          pip install "py2app>=0.28.6"

      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"
          elif [[ -n "${{ github.event.inputs.version }}" ]]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="dev"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "构建版本：$VERSION"

      - name: Build .app bundle
        run: python setup.py py2app 2>&1
        env:
          # 避免 py2app 因找不到 Xcode 工具链而报错
          MACOSX_DEPLOYMENT_TARGET: "12.0"

      - name: Verify .app bundle
        run: |
          if [ ! -d "dist/Claude UI Localizer.app" ]; then
            echo "::error::.app bundle 未生成，请查看上方构建日志"
            ls -la dist/ || echo "dist 目录不存在"
            exit 1
          fi
          echo ".app bundle 大小："
          du -sh "dist/Claude UI Localizer.app"

      - name: Create DMG
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          APP_PATH="dist/Claude UI Localizer.app"
          DMG_PATH="dist/ClaudeUILocalizer-v${VERSION}.dmg"

          TMP_DIR=$(mktemp -d)
          cp -r "$APP_PATH" "$TMP_DIR/"
          ln -s /Applications "$TMP_DIR/Applications"

          hdiutil create \
            -volname "Claude UI Localizer" \
            -srcfolder "$TMP_DIR" \
            -ov \
            -format UDZO \
            "$DMG_PATH"

          rm -rf "$TMP_DIR"
          echo "DMG 大小：$(du -sh "$DMG_PATH" | cut -f1)"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: ClaudeUILocalizer-v${{ steps.version.outputs.VERSION }}-dmg
          path: dist/*.dmg
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: "Claude UI Localizer v${{ steps.version.outputs.VERSION }}"
          files: dist/*.dmg
          generate_release_notes: true
          body: |
            ## 安装方式

            1. 下载 `ClaudeUILocalizer-v${{ steps.version.outputs.VERSION }}.dmg`
            2. 双击挂载 DMG
            3. 将「Claude UI Localizer」拖入 Applications 文件夹
            4. 右键 → 「打开」（首次运行需绕过 Gatekeeper）
            5. 在「系统设置 → 隐私与安全性 → 辅助功能」中授权

            ## 系统要求

            - macOS 12 (Monterey) 或更高版本
            - Claude.app 已安装
            - 在 config.json 中填入 Anthropic API Key（首次运行翻译时需要）
