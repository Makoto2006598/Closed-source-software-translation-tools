name: Build macOS DMG

on:
  # 推送 v* 格式的 tag 时自动触发（如 v1.0.0、v1.2.3）
  push:
    tags:
      - "v*"
  # 支持手动触发，用于测试构建
  workflow_dispatch:
    inputs:
      version:
        description: "版本号（如 1.0.0）"
        required: false
        default: "dev"

jobs:
  build:
    name: Build DMG on macOS
    runs-on: macos-latest

    steps:
      # 1. 检出代码
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. 设置 Python 环境
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # 3. 安装所有依赖（含 py2app）
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install "py2app>=0.28.6"

      # 4. 确定版本号
      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"   # 去掉前缀 "v"
          elif [[ "${{ github.event.inputs.version }}" != "" ]]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="dev"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "构建版本：$VERSION"

      # 5. 更新 setup.py 中的版本号
      - name: Update version in setup.py
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          sed -i '' "s/\"CFBundleVersion\": \".*\"/\"CFBundleVersion\": \"$VERSION\"/" setup.py
          sed -i '' "s/\"CFBundleShortVersionString\": \".*\"/\"CFBundleShortVersionString\": \"$VERSION\"/" setup.py
          sed -i '' "s/version=\".*\",/version=\"$VERSION\",/" setup.py

      # 6. 构建 .app bundle
      - name: Build .app bundle
        run: python setup.py py2app

      # 7. 验证 .app 是否生成
      - name: Verify .app bundle
        run: |
          if [ ! -d "dist/Claude UI Localizer.app" ]; then
            echo "::error::.app bundle 未生成"
            exit 1
          fi
          echo ".app bundle 大小："
          du -sh "dist/Claude UI Localizer.app"

      # 8. 创建 DMG
      - name: Create DMG
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          APP_PATH="dist/Claude UI Localizer.app"
          DMG_PATH="dist/ClaudeUILocalizer-v${VERSION}.dmg"

          TMP_DIR=$(mktemp -d)
          cp -r "$APP_PATH" "$TMP_DIR/"
          ln -s /Applications "$TMP_DIR/Applications"

          hdiutil create \
            -volname "Claude UI Localizer" \
            -srcfolder "$TMP_DIR" \
            -ov \
            -format UDZO \
            "$DMG_PATH"

          rm -rf "$TMP_DIR"

          echo "DMG 已生成：$DMG_PATH"
          echo "DMG 大小：$(du -sh "$DMG_PATH" | cut -f1)"
          echo "DMG_PATH=$DMG_PATH" >> $GITHUB_ENV

      # 9. 上传 DMG 为 Actions artifact（每次构建均可下载）
      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: ClaudeUILocalizer-v${{ steps.version.outputs.VERSION }}-dmg
          path: dist/*.dmg
          retention-days: 30

      # 10. 发布到 GitHub Release（仅 tag 触发时）
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: "Claude UI Localizer v${{ steps.version.outputs.VERSION }}"
          files: dist/*.dmg
          generate_release_notes: true
          body: |
            ## 安装方式

            1. 下载 `ClaudeUILocalizer-v${{ steps.version.outputs.VERSION }}.dmg`
            2. 双击挂载 DMG
            3. 将「Claude UI Localizer」拖入 Applications 文件夹
            4. 右键→「打开」（首次运行需绕过 Gatekeeper）
            5. 在「系统设置 → 隐私与安全性 → 辅助功能」中授权

            ## 系统要求

            - macOS 12 (Monterey) 或更高版本
            - Claude.app 已安装
            - 在 config.json 中填入 Anthropic API Key（首次运行翻译时需要）
